name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

    paths:
      - "RedeemGift.ReactNative/docs/**"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Disable Jekyll
        run: |
          touch RedeemGift.ReactNative/docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: RedeemGift.ReactNative/docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
